<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Карта задач Helpdesk</title>

<style>
  body { margin: 0; padding: 0; }
  #map { width: 100%; height: 100vh; }

  .balloon-task {
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #ddd;
  }

  .balloon-btn {
      display: inline-block;
      padding: 6px 10px;
      margin: 4px 4px 0 0;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
      font-size: 13px;
  }

  .btn-yandex {
      background: #ffcc00;
      color: #000;
  }

  .btn-intra {
      background: #2c7be5;
      color: #fff;
  }
</style>

<script src="https://api-maps.yandex.ru/2.1/?apikey=dc60a9c5-3268-40d8-9bf7-faa1168a1b70&lang=ru_RU" type="text/javascript"></script>

</head>
<body>

<div id="map"></div>

<script>
ymaps.ready(init);

async function init() {

    const map = new ymaps.Map("map", {
        center: [55.76, 37.64],
        zoom: 10,
        controls: ['zoomControl', 'geolocationControl']
    });

    try {
        const result = await ymaps.geolocation.get({
            provider: 'browser',
            mapStateAutoApply: true
        });

        map.geoObjects.add(result.geoObjects);

    } catch (e) {
        console.log("Геолокация не разрешена");
    }

    const tasks = await fetch("tasks.json").then(r => r.json());

    const grouped = {};

    for (let t of tasks) {

        if (!t.organization_address) continue;

        try {
            const geo = await ymaps.geocode(t.organization_address);
            const obj = geo.geoObjects.get(0);
            if (!obj) continue;

            const coords = obj.geometry.getCoordinates();
            const key = coords[0].toFixed(6) + "," + coords[1].toFixed(6);

            if (!grouped[key]) {
                grouped[key] = {
                    coords: coords,
                    address: t.organization_address,
                    tasks: []
                };
            }

            grouped[key].tasks.push(t);

        } catch (e) {
            console.log("Ошибка геокодирования:", t.organization_address);
        }
    }

    for (let key in grouped) {

        const group = grouped[key];

        let balloonContent = `<div style="font-size:14px;">
            <b>${group.address}</b><br><br>`;

        for (let t of group.tasks) {

            const addressEncoded = encodeURIComponent(group.address);
            const yandexLink = `https://yandex.ru/maps/?text=${addressEncoded}`;

            const bitrixLink = `https://f2c.bitrix24.ru/workgroups/group/173/tasks/task/view/${t.bitrix_id}/`;

            let phone = t.contact_phone || "";
            let phoneClean = phone.replace(/[^+\d]/g, "");

            balloonContent += `
                <div class="balloon-task">
                    <b>Заявка #${t.bitrix_id}</b><br>

                    Статус: ${t.status || "—"}<br><br>

                    <div>
                        <b>Контакт</b><br>

                        Имя: ${t.contact_name ? t.contact_name : "Неизвестно"}<br>

                        Телефон: ${
                            phone
                            ? `<a href="tel:${phoneClean}">${phone}</a>`
                            : "Неизвестно"
                        }
                    </div>

                    <br>

                    <a href="${yandexLink}" target="_blank" class="balloon-btn btn-yandex">
                        📍 Яндекс
                    </a>

                    <a href="${bitrixLink}" target="_blank" class="balloon-btn btn-intra">
                        🛠 Битрикс
                    </a>
                </div>
            `;
        }

        balloonContent += `</div>`;

        const placemark = new ymaps.Placemark(group.coords, {
            balloonContent: balloonContent
        }, {
            preset: "islands#redDotIcon"
        });

        map.geoObjects.add(placemark);
    }
}
</script>

</body>
</html>
